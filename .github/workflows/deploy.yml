name: Deploy to EC2

on:
  push:
    branches: [ deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: delta

      - name: Build with Gradle
        run: ./gradlew bootJar -x test
        working-directory: delta

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/BE/delta
            git pull origin deploy
            ./gradlew bootJar -x test
            sudo fuser -k 8081/tcp || true
            
            # 💡 secrets 변수 대신 진짜 정보들을 다이렉트로 안전하게 주입해 줍니다!
            RDS_ENDPOINT="unis-delta-rds.cfomgu60kv33.ap-northeast-2.rds.amazonaws.com" \
            DB_USERNAME="admin" \
            DB_PASSWORD="teddybrown0315!" \
            nohup java -Dfile.encoding=UTF-8 -jar build/libs/delta-0.0.1-SNAPSHOT.jar > /home/ubuntu/BE/delta/nohup.out 2>&1 &
