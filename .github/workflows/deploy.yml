name: Deploy to EC2

on:
  push:
    branches: [ deploy ]  # 1. 델타 프로젝트의 메인 브랜치명으로 매칭

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/BE/delta
            git pull origin main
            ./gradlew bootJar -x test
            sudo fuser -k 8081/tcp || true
            RDS_ENDPOINT="${{ secrets.RDS_ENDPOINT }}" DB_USERNAME="${{ secrets.DB_USERNAME }}" DB_PASSWORD="${{ secrets.DB_PASSWORD }}" nohup java -Dfile.encoding=UTF-8 -jar build/libs/delta-0.0.1-SNAPSHOT.jar > /home/ubuntu/BE/delta/nohup.out 2>&1 &
