spring:
  application:
    name: delta

  sql:
    init:
      mode: always

  datasource:
    url: jdbc:mysql://localhost:3306/delta?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DELTA_DB_USERNAME}
    password: ${DELTA_DB_PASSWORD}
    driver-class-name: ${DELTA_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${DELTA_JPA_DDL_AUTO:create}
    show-sql: ${DELTA_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${DELTA_JPA_FORMAT_SQL:true}
        jdbc.time_zone: Asia/Seoul

server:
  port: ${DELTA_SERVER_PORT:8080}

jwt:
  secret: ${DELTA_JWT_SECRET:unisDeltaProjectJwtSecretKey2026DeltaApplicationSecret}
  access-token-expiration: ${DELTA_JWT_ACCESS_EXPIRATION:86400000}
  refresh-token-expiration: ${DELTA_JWT_REFRESH_EXPIRATION:1209600000}

kakao:
  client-id: ${KAKAO_CLIENT_ID:6c442a8e0ec8aa34ab54b8f839667cef}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/kakao/login}